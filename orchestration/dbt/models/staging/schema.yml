version: 2

models:
  - name: stg_users__fu
    description: User profile staging with upsert semantics.
    columns:
      - name: user_id
        tests: [not_null, unique]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_created_at
        tests: [not_null]
      - name: tf_updated_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
      - name: tf_record_status
        tests:
          - accepted_values:
              values: [0, 1]

  - name: stg_listen_events__fa
    description: Listen events append-only staging.
    columns:
      - name: event_datetime
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: stg_page_view_events__fa
    description: Page view events append-only staging.
    columns:
      - name: event_datetime
        tests: [not_null]
      - name: session_id
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: stg_status_change_events__fa
    description: Status change append-only staging.
    columns:
      - name: event_datetime
        tests: [not_null]
      - name: user_id
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: stg_user_profile__snp
    description: Latest profile snapshot in staging.
    columns:
      - name: user_id
        tests: [not_null, unique]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
