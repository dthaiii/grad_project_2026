version: 2

models:
  - name: app_users__s2
    columns:
      - name: pk_user
        tests: [not_null, unique]
      - name: user_id
        tests: [not_null]
      - name: row_effective_datetime
        tests: [not_null]
      - name: row_expiry_datetime
        tests: [not_null]
      - name: tf_created_at
        tests: [not_null]
      - name: tf_updated_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
      - name: tf_record_status
        tests:
          - accepted_values:
              values: [0, 1]

  - name: app_pages__snp
    columns:
      - name: pk_page
        tests: [not_null, unique]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
