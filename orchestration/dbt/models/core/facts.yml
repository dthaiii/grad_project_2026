version: 2

models:
  - name: app_user_subscription__fu
    columns:
      - name: user_id
        tests: [not_null]
      - name: tf_partition_date
        tests: [not_null]
      - name: tf_created_at
        tests: [not_null]
      - name: tf_updated_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
      - name: tf_record_status
        tests:
          - accepted_values:
              values: [0, 1]

  - name: app_page_view_events__fa
    columns:
      - name: event_datetime
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: app_listen_events__fa
    tests:
      - unique:
          column_name: listen_event_key
    columns:
      - name: listen_event_key
        tests: [not_null]
      - name: pk_user
        tests:
          - relationships:
              field: pk_user
              to: ref('app_users__s2')
      - name: pk_song
        tests:
          - relationships:
              field: pk_song
              to: ref('app_songs__snp')
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: app_session_events__snp
    columns:
      - name: session_start_datetime
        tests: [not_null]
      - name: session_id
        tests: [not_null]
      - name: pk_user
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: app_status_change_events__fu
    tests:
      - unique:
          column_name: status_change_event_key
    columns:
      - name: status_change_event_key
        tests: [not_null]
      - name: tf_created_at
        tests: [not_null]
      - name: tf_updated_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
      - name: tf_record_status
        tests:
          - accepted_values:
              values: [0, 1]

  - name: app_auth_events__fa
    tests:
      - unique:
          column_name: auth_event_key
    columns:
      - name: auth_event_key
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]

  - name: app_session_start_end_events__fa
    tests:
      - unique:
          column_name: session_state_event_key
    columns:
      - name: session_state_event_key
        tests: [not_null]
      - name: tf_sourcing_at
        tests: [not_null]
      - name: tf_etl_at
        tests: [not_null]
